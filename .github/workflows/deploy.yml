name: Deploy Lumera Static Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/githubdeployforlumera
          chmod 600 ~/.ssh/githubdeployforlumera
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/githubdeployforlumera" \
            --exclude=".git" \
            --exclude=".github" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lumera/

      - name: Reload Apache
        run: |
          ssh -i ~/.ssh/githubdeployforlumera ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            sudo chmod -R 755 /var/www/lumera
            sudo systemctl restart httpd
          EOF
